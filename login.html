<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ground Water Level Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex items-center justify-center bg-cover bg-center" 
      style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600&auto=format&fit=crop&q=60');">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Login Card -->
  <div class="relative bg-white shadow-2xl rounded-2xl p-10 max-w-md w-full z-10 animate-fadeIn">
    <h1 class="text-2xl font-extrabold text-blue-700 mb-6 text-center">
      🌊 Login to Ground Water Predictor
    </h1>

    <!-- Form -->
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" 
             class="w-full mb-4 px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input type="password" id="password" placeholder="Password" 
             class="w-full mb-4 px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">

      <button type="submit" 
              class="w-full bg-blue-600 text-white py-3 rounded-lg shadow-md hover:bg-blue-700 transition duration-300">
        Login
      </button>
    </form>
  </div>

  <!-- Animation -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 1.2s ease-out;
    }
  </style>

  <!-- Script -->
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("⚠ Please enter both email and password.");
        return;
      }

      // ✅ Save email to localStorage for Settings page
      localStorage.setItem("userEmail", email);

      // Redirect to Dashboard
      window.location.href = "dashboard.html";
    });
  </script>

</body>
</html>
