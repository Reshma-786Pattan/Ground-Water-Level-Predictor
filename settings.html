<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ Settings | Groundwater Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body.moving-bg {
      background: linear-gradient(-45deg, #1e3a8a, #0284c7, #22c55e, #0d9488);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
    }
    body.static-bg {
      background: linear-gradient(to right, #1e3a8a, #0d9488, #22c55e);
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center static-bg">

  <div class="bg-white/95 rounded-2xl shadow-2xl p-10 max-w-lg w-full">
    <h1 class="text-3xl font-bold text-blue-700 mb-6 text-center">⚙️ Settings</h1>

    <form id="settingsForm" class="space-y-6">
      <!-- Name -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
        <input type="text" id="name" required 
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400" 
               placeholder="Enter your name">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Email</label>
        <input type="email" id="email" required 
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400" 
               placeholder="Enter your email">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Password</label>
        <input type="password" id="password" minlength="6" required 
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400" 
               placeholder="Enter new password">
      </div>

      <!-- Contact -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Contact Number</label>
        <input type="tel" id="contact" pattern="[0-9]{10}" required 
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400" 
               placeholder="10-digit phone number">
      </div>

      <!-- Toggle Background -->
      <div class="flex items-center justify-between">
        <label class="text-gray-700 font-semibold">🌈 Background Mode</label>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="bgToggle" class="sr-only">
          <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600 transition"></div>
          <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full peer-checked:translate-x-5 transition"></span>
        </label>
        <span id="bgStatus" class="ml-2 text-sm font-semibold text-gray-600">Static</span>
      </div>

      <!-- Save Button -->
      <button type="submit" 
              class="w-full px-6 py-3 bg-gradient-to-r from-green-600 to-blue-600 text-white font-semibold rounded-xl shadow-lg hover:opacity-90 transition">
        💾 Save Settings
      </button>
    </form>

    <!-- Status -->
    <p id="statusMessage" class="mt-4 text-center text-sm font-semibold"></p>

    <!-- Back -->
    <div class="flex justify-center mt-6">
      <a href="dashboard.html" 
         class="px-6 py-2 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow hover:opacity-90">
         🔙 Back to Dashboard
      </a>
    </div>
  </div>

  <script>
    // Load saved settings if available
    const savedSettings = JSON.parse(localStorage.getItem("userSettings"));
    if (savedSettings) {
      document.getElementById("name").value = savedSettings.name || "";
      document.getElementById("email").value = savedSettings.email || "";
      document.getElementById("password").value = savedSettings.password || "";
      document.getElementById("contact").value = savedSettings.contact || "";

      if (savedSettings.bgMode === "moving") {
        document.getElementById("bgToggle").checked = true;
        document.body.classList.remove("static-bg");
        document.body.classList.add("moving-bg");
        document.getElementById("bgStatus").innerText = "Moving";
      }
    }

    // Background toggle
    document.getElementById("bgToggle").addEventListener("change", function () {
      if (this.checked) {
        document.body.classList.remove("static-bg");
        document.body.classList.add("moving-bg");
        document.getElementById("bgStatus").innerText = "Moving";
      } else {
        document.body.classList.remove("moving-bg");
        document.body.classList.add("static-bg");
        document.getElementById("bgStatus").innerText = "Static";
      }
    });

    // Save form
    document.getElementById("settingsForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const contact = document.getElementById("contact").value.trim();
      const bgMode = document.getElementById("bgToggle").checked ? "moving" : "static";

      if (!name || !email || !password || !contact) {
        document.getElementById("statusMessage").innerText = "⚠️ Please fill all fields correctly.";
        document.getElementById("statusMessage").className = "mt-4 text-center text-red-600 font-semibold";
        return;
      }

      // Save settings
      const userSettings = { name, email, password, contact, bgMode };
      localStorage.setItem("userSettings", JSON.stringify(userSettings));

      document.getElementById("statusMessage").innerText = "✅ Settings saved successfully!";
      document.getElementById("statusMessage").className = "mt-4 text-center text-green-600 font-semibold";
    });
  </script>

</body>
</html>
