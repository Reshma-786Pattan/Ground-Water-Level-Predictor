<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Data | Groundwater Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-cover bg-center"
      style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600&q=80&auto=format&fit=crop');">

  <div class="bg-white/90 rounded-2xl shadow-2xl p-10 max-w-2xl w-full text-center">
    <h1 class="text-3xl font-bold text-blue-700 mb-4">⬆ Upload Groundwater Data</h1>
    <p class="text-gray-700 mb-6">Upload your dataset (CSV format). The system will automatically process it and show predictions & insights.</p>

    <!-- Upload Form -->
    <form id="uploadForm" class="space-y-6">
      <div>
        <input type="file" id="fileInput" accept=".csv"
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400">
      </div>

      <button type="submit"
              class="w-full px-6 py-3 bg-gradient-to-r from-green-600 to-blue-600 text-white font-semibold rounded-xl shadow-lg hover:opacity-90 transition">
        Upload & Predict
      </button>
    </form>

    <div class="mt-6">
      <a href="dashboard.html"
         class="px-6 py-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow hover:opacity-90">
         🔙 Back to Dashboard
      </a>
    </div>
  </div>

  <script>
    document.getElementById("uploadForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) {
        alert("⚠️ Please select a CSV file first.");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        const text = e.target.result;
        localStorage.setItem("uploadedCSV", text);
        window.location.href = "upload-output.html"; // Redirect after saving
      };

      reader.readAsText(file);
    });
  </script>

</body>
</html>
