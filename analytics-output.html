<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Output | Groundwater Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-cover bg-center flex items-center justify-center p-8"
      style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600&q=80&auto=format&fit=crop');">

  <div class="bg-white/95 rounded-2xl shadow-2xl p-10 max-w-5xl w-full">
    <h1 class="text-3xl font-bold text-blue-700 mb-6">📊 Analytics Results</h1>

    <!-- Summary Cards -->
    <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"></div>

    <!-- Graph -->
    <canvas id="analyticsChart" class="mb-6"></canvas>

    <!-- Buttons -->
    <div class="flex justify-between">
      <a href="analytics-input.html" 
         class="px-6 py-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow hover:opacity-90">
         🔙 Back
      </a>
      <a href="dashboard.html" 
         class="px-6 py-3 bg-gradient-to-r from-blue-600 to-green-500 text-white rounded-xl shadow hover:opacity-90">
         🏠 Dashboard
      </a>
    </div>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem("analyticsData"));
    if(data){
      // Fake data generator
      const labels = [];
      const values = [];
      let baseline = Math.floor(Math.random()*20)+10;
      for(let i=0;i<data.years;i++){
        labels.push(`${2025 - i}`);
        values.push(baseline + Math.floor(Math.random()*10 - 5));
      }

      // Summary stats
      const avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(2);
      const trend = values[0] > values[values.length-1] ? "Decreasing 📉" : "Increasing 📈";
      const latest = values[values.length-1];

      // Show summary cards
      document.getElementById("summaryCards").innerHTML = `
        <div class="bg-gradient-to-r from-blue-400 to-blue-600 text-white rounded-xl p-6 shadow-lg">
          <h2 class="text-xl font-bold">📍 Location</h2>
          <p class="text-lg">${data.location}</p>
        </div>
        <div class="bg-gradient-to-r from-green-400 to-green-600 text-white rounded-xl p-6 shadow-lg">
          <h2 class="text-xl font-bold">📊 Average</h2>
          <p class="text-lg">${avg}</p>
        </div>
        <div class="bg-gradient-to-r from-purple-400 to-purple-600 text-white rounded-xl p-6 shadow-lg">
          <h2 class="text-xl font-bold">📈 Trend</h2>
          <p class="text-lg">${trend} (Latest: ${latest})</p>
        </div>
      `;

      // Chart
      new Chart(document.getElementById("analyticsChart"), {
        data: {
          labels: labels.reverse(),
          datasets: [
            {
              type: 'line',
              label: `${data.parameter} Trend`,
              data: values.reverse(),
              borderColor: "rgba(37, 99, 235, 1)",
              backgroundColor: "rgba(37, 99, 235, 0.2)",
              tension: 0.3,
              fill: true
            },
            {
              type: 'bar',
              label: `${data.parameter} Values`,
              data: values,
              backgroundColor: "rgba(16, 185, 129, 0.6)"
            }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "top" } },
          scales: { y: { beginAtZero: false } }
        }
      });
    }
  </script>

</body>
</html>
