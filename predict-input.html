<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ground Water Prediction Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cover bg-center flex items-center justify-center"
  style="background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=1200&auto=format&fit=crop&q=60');">

  <div class="bg-black/60 p-8 rounded-2xl shadow-2xl w-full max-w-3xl">
    <h1 class="text-3xl font-extrabold text-white mb-6 text-center">🔮 Ground Water Prediction Input</h1>
    <form id="predictForm" class="grid md:grid-cols-2 gap-6 text-white">
      <!-- Location -->
      <div class="md:col-span-2">
        <label class="block mb-1">🌍 Location</label>
        <input type="text" id="location" name="location" placeholder="Village, District, State"
          class="w-full px-4 py-2 rounded-lg text-black">
        <button type="button" onclick="getLocation()" 
          class="mt-2 px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700">
          📍 Use Current Location
        </button>
      </div>
      <!-- Rainfall -->
      <div>
        <label class="block mb-1">☔ Rainfall (mm)</label>
        <input type="number" name="rainfall" placeholder="e.g. 120" 
          class="w-full px-4 py-2 rounded-lg text-black">
      </div>
      <!-- Temperature -->
      <div>
        <label class="block mb-1">🌡 Temperature (°C)</label>
        <input type="number" name="temperature" placeholder="e.g. 28" 
          class="w-full px-4 py-2 rounded-lg text-black">
      </div>
      <!-- Usage -->
      <div>
        <label class="block mb-1">🚰 Usage (m³/day)</label>
        <input type="number" name="usage" placeholder="e.g. 500" 
          class="w-full px-4 py-2 rounded-lg text-black">
      </div>
      <!-- Submit -->
      <div class="md:col-span-2 text-center mt-6">
        <button type="submit" 
          class="px-8 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl shadow-lg">
          Submit & Predict
        </button>
      </div>
    </form>
  </div>

  <script>
    // Get Current Location (reverse geocoding requires API, here just coordinates)
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          document.getElementById("location").value = 
            `Lat: ${position.coords.latitude.toFixed(3)}, Lon: ${position.coords.longitude.toFixed(3)}`;
        });
      } else {
        alert("Geolocation is not supported by this browser.");
      }
    }

    // Save form data and redirect
    document.getElementById("predictForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const formData = {
        location: this.location.value,
        rainfall: this.rainfall.value,
        temperature: this.temperature.value,
        usage: this.usage.value
      };
      localStorage.setItem("predictionInput", JSON.stringify(formData));
      window.location.href = "predict-output.html";
    });
  </script>
</body>
</html>
