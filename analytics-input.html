<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Input | Groundwater Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-cover bg-center"
      style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600&q=80&auto=format&fit=crop');">

  <div class="bg-white/90 rounded-2xl shadow-2xl p-10 max-w-lg w-full text-center">
    <h1 class="text-3xl font-bold text-blue-700 mb-4">📊 Analytics</h1>
    <img src="https://images.unsplash.com/photo-1523731407965-2430cd12f5e4?w=600&q=80&auto=format&fit=crop"
         class="w-full h-40 object-cover rounded-xl mb-6 shadow-md" alt="Analytics Image">

    <form id="analyticsForm" class="space-y-6">
      <div>
        <label class="block text-left text-gray-700 font-semibold">Location</label>
        <input type="text" id="location" placeholder="Enter city or village"
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-left text-gray-700 font-semibold">Years of Data</label>
        <input type="number" id="years" placeholder="e.g., 5" min="1"
               class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-green-400">
      </div>

      <div>
        <label class="block text-left text-gray-700 font-semibold">Parameter</label>
        <select id="parameter" class="w-full px-4 py-3 border rounded-lg shadow focus:ring-2 focus:ring-purple-400">
          <option value="rainfall">Rainfall (mm)</option>
          <option value="groundwater">Groundwater Level (m bgl)</option>
          <option value="usage">Water Usage (m³/day)</option>
        </select>
      </div>

      <button type="submit" 
              class="w-full px-6 py-3 bg-gradient-to-r from-blue-600 to-green-500 text-white font-semibold rounded-xl shadow-lg hover:opacity-90 transition">
        Show Analytics
      </button>
    </form>
  </div>

  <script>
    document.getElementById("analyticsForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const data = {
        location: document.getElementById("location").value,
        years: document.getElementById("years").value,
        parameter: document.getElementById("parameter").value
      };
      localStorage.setItem("analyticsData", JSON.stringify(data));
      window.location.href = "analytics-output.html";
    });
  </script>

</body>
</html>
